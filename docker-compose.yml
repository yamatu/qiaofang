services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: qiaofang
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: qiaofang
      JWT_SECRET: qiaofang-jwt-secret-2026
      PORT: "9580"
    ports:
      - "9580:9580"
    volumes:
      - uploads:/app/uploads
      - backups:/app/backups
    depends_on:
      db:
        condition: service_healthy

  seed:
    build: ./backend
    command: ["./seed", "admin", "admin123"]
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: qiaofang
    depends_on:
      backend:
        condition: service_started

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: /api
    ports:
      - "4173:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
  backups:
